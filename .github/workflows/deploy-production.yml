name: Deploy to Hostinger VPS (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build frontend on GitHub runner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve VPS app path
        id: vps_path
        run: |
          CLEAN_PATH=$(printf '%s' "${{ secrets.VPS_APP_PATH }}" | tr -d '\r\n' | sed 's:/*$::')
          echo "::add-mask::$CLEAN_PATH"
          echo "path=$CLEAN_PATH" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build with production env
        working-directory: frontend
        env:
          CI: false
        run: |
          echo "REACT_APP_BACKEND_URL=https://myhomeusb.com" > .env
          yarn build

      - name: Update backend code on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd "${{ steps.vps_path.outputs.path }}"
            echo "==> Pulling latest main (backend code)"
            git fetch --all
            git reset --hard origin/main

            echo "==> Installing backend deps"
            cd backend
            if [ -f requirements.txt ]; then
              if [ -d venv ]; then
                source venv/bin/activate
              fi
              pip install -r requirements.txt || true
            fi
            cd ..

            echo "==> Preparing fresh build directory"
            rm -rf frontend/build

      - name: Copy built frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "frontend/build/"
          target: "${{ steps.vps_path.outputs.path }}"
          overwrite: true

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd "${{ steps.vps_path.outputs.path }}"

            echo "==> Restoring production frontend .env on VPS"
            echo "REACT_APP_BACKEND_URL=https://myhomeusb.com" > frontend/.env

            echo "==> Ensuring swap exists (OOM protection)"
            if [ ! -f /swapfile ]; then
              fallocate -l 2G /swapfile && chmod 600 /swapfile && mkswap /swapfile && swapon /swapfile && echo '/swapfile none swap sw 0 0' >> /etc/fstab || true
            fi

            echo "==> Restarting PM2 backend"
            pm2 restart all --update-env
            pm2 save

            echo "==> Verifying deployment"
            ls frontend/build/index.html
            pm2 status
            echo "===DEPLOY COMPLETE==="
